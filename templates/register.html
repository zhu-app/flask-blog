<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Ink & Code</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">✍️ Ink & Code</a>
        </div>
    </nav>

    <div class="container auth-container">
        <!-- flash 消息 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="msg {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="auth-card">
            <h1>✨ 注册账号</h1>
            <form method="POST" action="/api/register" class="auth-form" id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required minlength="2" maxlength="20">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="至少6位" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">注册</button>
            </form>
            <p class="auth-link">已有账号？<a href="/login">立即登录</a></p>
            <div id="regMsg" class="msg" style="display:none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const msgDiv = document.getElementById('regMsg');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(Object.fromEntries(formData))
                });
                const data = await res.json();

                if (data.success) {
                    msgDiv.style.display = 'block';
                    msgDiv.className = 'msg success';
                    msgDiv.textContent = '注册成功！即将跳转到登录页...';
                    setTimeout(() => location.href = '/login', 1500);
                } else {
                    msgDiv.style.display = 'block';
                    msgDiv.className = 'msg error';
                    msgDiv.textContent = data.message;
                }
            } catch (err) {
                msgDiv.style.display = 'block';
                msgDiv.className = 'msg error';
                msgDiv.textContent = '网络错误，请重试';
            }
        });
    </script>
</body>
</html>
