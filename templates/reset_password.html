<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - Ink & Code</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">✍️ Ink & Code</a>
        </div>
    </nav>
    <div class="container auth-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <div class="auth-card">
            <h1>重置密码</h1>
            <form method="POST" class="auth-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="password" placeholder="至少 6 位" required minlength="6">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" placeholder="再次输入新密码" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">确认重置</button>
            </form>
        </div>
    </div>
</body>
</html>
