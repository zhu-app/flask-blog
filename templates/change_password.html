<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - Ink & Code</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">✍️ Ink & Code</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/dashboard">📋 我的面板</a>
                <span>欢迎, {{ user.username }}</span>
                <a href="/logout">退出</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="auth-container" style="min-height:60vh">
            <div class="auth-card">
                <h1>🔑 修改密码</h1>
                <form method="POST" class="auth-form">
                    <div class="form-group">
                        <label>当前密码</label>
                        <input type="password" name="old_password" placeholder="输入当前密码" required>
                    </div>
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="password" name="new_password" placeholder="至少6位" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>确认新密码</label>
                        <input type="password" name="confirm_password" placeholder="再次输入新密码" required minlength="6">
                    </div>
                    <button type="submit" class="btn-primary">确认修改</button>
                </form>
                <p class="auth-link"><a href="/dashboard">← 返回个人中心</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Ink & Code | Flask + MySQL</p>
        </div>
    </footer>
</body>
</html>
