<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">✍️ Ink & Code</a>
            <div class="nav-links">
                {% if current_user %}
                    <span>欢迎, {{ current_user.username }}</span>
                    <a href="/write">写文章</a>
                    <a href="/dashboard">📋 我的面板</a>
                    {% if current_user.role == 'admin' %}<a href="/admin">👑 管理</a>{% endif %}
                    <a href="/logout">退出</a>
                {% else %}
                    <a href="/login" class="btn-nav">登录</a>
                    <a href="/register" class="btn-nav btn-nav-reg">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="error-page">
            <h1>404</h1>
            <p>抱歉，您访问的页面不存在</p>
            <a href="{{ url_for('posts.index') }}" class="btn btn-primary">返回首页</a>
        </div>
    </main>
</body>
</html>
