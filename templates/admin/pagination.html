{% if pagination and pagination.pages > 1 %}
<div class="pagination">
    {% if pagination.has_prev %}
    <a href="?page={{ pagination.prev_num }}{% if status %}&status={{ status }}{% endif %}">上一页</a>
    {% endif %}
    <span>第 {{ pagination.page }} / {{ pagination.pages }} 页</span>
    {% if pagination.has_next %}
    <a href="?page={{ pagination.next_num }}{% if status %}&status={{ status }}{% endif %}">下一页</a>
    {% endif %}
</div>
{% endif %}
