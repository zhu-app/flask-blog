<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - Ink & Code</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">✍️ Ink & Code</a>
        </div>
    </nav>
    <div class="container auth-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <div class="auth-card">
            <h1>找回密码</h1>
            <form method="POST" class="auth-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" placeholder="注册时使用的邮箱" required>
                </div>
                <button type="submit" class="btn-primary">生成重置链接</button>
            </form>
            {% if reset_url %}
            <div class="msg success" style="display:block;word-break:break-all">
                本地开发链接：<a href="{{ reset_url }}">{{ reset_url }}</a>
            </div>
            {% endif %}
            <p class="auth-link"><a href="/login">返回登录</a></p>
        </div>
    </div>
</body>
</html>
